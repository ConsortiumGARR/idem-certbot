# /etc/rsyslog.conf configuration file for rsyslog

#################
#### MODULES ####
#################

# Carica il modulo per i log locali
#module(load="imuxsock")   # per la gestione dei log locali

###########################
#### GLOBAL DIRECTIVES ####
###########################

# Usa il formato di timestamp tradizionale
$ActionFileDefaultTemplate RSYSLOG_TraditionalFileFormat

# Imposta i permessi per i file di log
$FileOwner root
$FileGroup adm
$FileCreateMode 0640
$DirCreateMode 0755
$Umask 0022

# Dove mettere i file di spool e stato
$WorkDirectory /var/spool/rsyslog

# Includi tutti i file di configurazione in /etc/rsyslog.d/
$IncludeConfig /etc/rsyslog.d/*.conf

###############
#### RULES ####
###############

# Regola per inviare i log di cron su stdout
template(name="CronLogFormat" type="string" string="[cron] %TIMESTAMP% %syslogtag%%msg%\n")

cron.*	/dev/stdout;CronLogFormat

# Puoi aggiungere altre regole per inviare log di altri servizi a stdout se necessario
# auth,authpriv.*      /var/log/auth.log
# daemon.*             /var/log/daemon.log
# kern.*               /var/log/kern.log
# mail.*               /var/log/mail.log
# user.*               /var/log/user.log
