---

- name: Ensure certbot system user is present
  ansible.builtin.user:
    name: certbot
    home: /home/certbot
    shell: /bin/bash
    create_home: true
    state: present

- name: Ensure certbot volume directory exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: certbot
    group: certbot
    mode: '0755'
  loop:
    - "{{ certbot_data_volume }}"
    - /home/certbot/.ssh

- name: Ensure rsync exists on Debian-based VMs (Debian, Ubuntu, Mint, Kali, Raspberry Pi OS)
  ansible.builtin.apt:
    name: rsync
    state: present
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_facts['os_family'] == 'Debian'

- name: Ensure rsync exists on RedHat-based VMs (RHEL, CentOS, Rocky Linux, AlmaLinux, Fedora, Oracle Linux)
  ansible.builtin.dnf:
    name: rsync
    state: present
  when: ansible_facts['os_family'] == 'RedHat'
