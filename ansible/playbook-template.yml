- name: Deployment Certbot
  hosts: # <INSERT_INVENTORY_HOST_OR_GROUP_NAME> 
  become: true
  become_method: sudo
  remote_user: # <INSERT_THE_REMOTE_USER>
  
  vars_files:
    - vars/secrets.yml
  tasks:
    - name: Ensure certbot user exists with home and bash shell
      ansible.builtin.user:
        name: certbot
        home: /home/certbot
        shell: /bin/bash
        create_home: true
        state: present

    - name: Create Certbot folder
      ansible.builtin.file:
        path: "/opt/certbot-deploy"
        state: directory
        recurse: yes

    - name: Generate DOMAINS_LIST string
      ansible.builtin.set_fact:
        domains_list: >-
          {{
            domains
            | map(attribute='domain') | zip(domains | map(attribute='aliases') | map('join', ',')) 
            | map('join', ':') 
            | map('regex_replace', ':$', '') 
            | join(';')
          }}

    - name: Copy files from template
      ansible.builtin.template:
        src: "{{ item }}"
        dest: "/opt/certbot-deploy/{{ item }}"
      loop:
        - "docker-compose.yml"
        - ".idemcertbot.env"

    - name: Run Certbot image
      ansible.builtin.shell: "docker compose pull && docker compose up -d"
      args:
        chdir: "/opt/certbot-deploy"

    - name: Delete Certbot folder
      ansible.builtin.file:
        path: "/opt/certbot-deploy"
        state: absent

    - name: Ensure .ssh directory exists for certbot
      ansible.builtin.file:
        path: "/home/certbot/.ssh"
        state: directory
        mode: '0700'
        owner: certbot
        group: certbot

    - name: Copy SSH key pair for certbot user
      ansible.builtin.copy:
        src: "{{ item.name }}"
        dest: "/home/certbot/.ssh/{{ item.name }}"
        mode: "{{ item.mode }}"
        owner: certbot
        group: certbot
      loop:
        - { name: 'id_ed25519_certbot', mode: '0600' }
        - { name: 'id_ed25519_certbot.pub', mode: '0644' }

    - name: Create Certbot Cron file for Rsync
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: "0755"
      loop:
        - { src: 'rsync_idem_certbot', dest: '/etc/cron.d/rsync_idem_certbot' }
        - { src: 'rsync_idem_certbot.sh', dest: '/usr/local/bin/rsync_idem_certbot.sh' }

- name: Deployment Certbot
  hosts: # <INSERT_INVENTORY_HOST_OR_GROUP_NAME> 
  become: true
  become_method: sudo
  remote_user: # <INSERT_THE_REMOTE_USER>

  tasks:
    - name: Ensure certbot user exists with home and bash shell
      ansible.builtin.user:
        name: certbot
        home: /home/certbot
        shell: /bin/bash
        create_home: true
        state: present

    - name: Ensure SSH directory exists for certbot user
      ansible.builtin.file:
        path: /home/certbot/.ssh
        state: directory
        owner: certbot
        group: certbot
        mode: '0700'

    - name: Copy SSH public key to authorized_keys for certbot
      ansible.builtin.copy:
        src: id_ed25519_certbot.pub
        dest: /home/certbot/.ssh/authorized_keys
        owner: certbot
        group: certbot
        mode: '0600'

    - name: Ensure /srv/idem-certbot exists with correct permissions
      ansible.builtin.file:
        path: /srv/idem-certbot
        state: directory
        owner: certbot
        group: certbot
        mode: '0755'
        recurse: yes
