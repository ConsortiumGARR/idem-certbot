---

- name: Deploy Prod Certbot
  hosts: controller-ba1 
  become: true
  become_method: sudo
  vars_files:
    - vars/secrets.yml
    - vars/prod_domains.yml

  tasks:
    - name: Deploy Certbot on the Prod controller nodes
      ansible.builtin.import_tasks: deploy_certbot_tasks.yml


- name: Configure Prod Certbot
  hosts: ba1 
  become: true
  become_method: sudo
  remote_user: debian

  tasks:
    - name: Config Certbot on the Prod container nodes
      ansible.builtin.import_tasks: config_certbot_tasks.yml